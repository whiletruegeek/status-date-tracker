name: Release

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to build, attest, and upload
        required: true
        type: string

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  build-attest-upload:
    runs-on: ubuntu-latest
    env:
      RELEASE_TAG: ${{ github.event.release.tag_name || inputs.tag }}
    steps:
      - name: Check out release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Attest main.js
        uses: actions/attest@v4
        with:
          subject-path: main.js

      - name: Attest manifest.json
        uses: actions/attest@v4
        with:
          subject-path: manifest.json

      - name: Upload release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "$RELEASE_TAG" main.js manifest.json --clobber
